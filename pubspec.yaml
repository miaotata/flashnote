name: flashnote
description: "闪念笔记 — 快速捕捉转瞬即逝的想法"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 数据库
  drift: 2.31.0
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # 工具
  uuid: ^4.5.1
  intl: ^0.19.0

  # 语音和传感器
  speech_to_text: ^7.2.0
  sensors_plus: ^6.1.0

  # 录音和播放
  record: ^6.2.0
  audioplayers: ^6.1.0

  # 图片选择
  image_picker: ^1.1.2

  # 本地存储
  shared_preferences: ^2.3.0

  # 通知和位置
  flutter_local_notifications: ^18.0.0
  geolocator: ^13.0.0
  timezone: ^0.10.0

  # 图表
  fl_chart: ^0.70.0

  # 后续阶段启用:
  # home_widget: ^0.7.0

dependency_overrides:
  sqlite3: ^2.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: 2.31.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
